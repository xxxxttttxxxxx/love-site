<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>love you thousand years - 登录</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body class="login-page">
  <div class="noise"></div>
  <div class="login-bg">
    <span class="float-heart h1">♡</span>
    <span class="float-heart h2">✦</span>
    <span class="float-heart h3">♡</span>
  </div>

  <main class="login-shell">
    <section class="login-copy">
      <p class="eyebrow">PRIVATE PLANET</p>
      <h1>love you<br/>thousand years</h1>
      <p>这里不是普通网站，是徐腾啸和陈意峰的小宇宙。每一次登录，都是回到我们自己的星球。</p>
      <div class="mini-tags">
        <span>故事</span><span>纪念日</span><span>相册</span><span>日历</span><span>私密</span>
      </div>
    </section>

    <section class="login-card luxury-card">
      <div class="brand-orb">♥</div>
      <p class="eyebrow center">ONLY FOR US</p>
      <h2>进入专属网站</h2>
      <p class="muted center">输入你们设置的账号密码进入。</p>

      <form id="loginForm" class="form-stack">
        <label>账号
          <input id="username" type="text" autocomplete="username" placeholder="chenyifeng" required />
        </label>
        <label>密码
          <input id="password" type="password" autocomplete="current-password" placeholder="输入密码" required />
        </label>
        <button class="primary-btn full" type="submit">进入我们的星球</button>
        <p id="loginMsg" class="form-msg"></p>
      </form>

      <p class="tiny-note">第一次上传后，建议把默认密码改成更复杂的。</p>
    </section>
  </main>

  <script src="./assets/js/config.js"></script>
  <script src="./assets/js/auth.js"></script>
</body>
</html>
