<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>密码哈希工具</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="login-page">
  <main class="login-shell" style="grid-template-columns:1fr;min-height:100vh;max-width:760px;">
    <section class="login-card luxury-card">
      <div class="brand-orb">#</div>
      <p class="eyebrow center">SHA-256 TOOL</p>
      <h2>密码哈希工具</h2>
      <p class="muted center">输入新密码，生成 SHA-256，然后复制到 <code>assets/js/config.js</code> 的 passwordHash。</p>
      <div class="form-stack">
        <label>新密码<input id="pwd" type="text" placeholder="输入新密码" /></label>
        <button id="btn" class="primary-btn full" type="button">生成哈希</button>
        <label>生成结果<textarea id="out" readonly placeholder="这里会出现哈希"></textarea></label>
      </div>
      <p class="tiny-note"><a href="../index.html">返回登录页</a></p>
    </section>
  </main>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const pwd = document.getElementById('pwd').value;
      document.getElementById('out').value = await sha256(pwd);
    });
  </script>
</body>
</html>
