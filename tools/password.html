<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>密码哈希生成工具</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body class="login-body">
  <main class="login-card">
    <div class="brand-mark">#</div>
    <h1>密码哈希工具</h1>
    <p class="muted">输入新密码，生成 SHA-256，然后复制到 config.js 的 passwordHash。</p>
    <div class="form">
      <label>新密码<input id="pwd" type="text" placeholder="输入新密码" /></label>
      <button id="btn">生成</button>
      <label>passwordHash<textarea id="out" rows="4" readonly></textarea></label>
    </div>
  </main>
  <script src="../assets/js/auth.js"></script>
  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const pwd = document.getElementById('pwd').value;
      document.getElementById('out').value = await sha256(pwd);
    });
  </script>
</body>
</html>
